kind = "web"
previewPath = "/"
title = "ivera.priv"
version = "1.0.0"
id = "artifacts/ivera-priv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20313

[services.development]
run = "pnpm --filter @workspace/ivera-priv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ivera-priv", "run", "build" ]
publicDir = "artifacts/ivera-priv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20313"
BASE_PATH = "/"
